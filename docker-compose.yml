version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - incidents-net

volumes:
  postgres-data:
  mongo-data:
  ollama-data:

networks:
  incidents-net:
    driver: bridge