version: '3.8'

services:
  # ===== OLLAMA (LLM Local) =====
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - incidents-network

  # ===== BASE DE DONNEES (PostgreSQL — cahier des charges) =====
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MINIO (stockage fichiers — cahier des charges) =====
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - incidents-network

  # ===== KEYCLOAK (port 8180 — PAS 8888 !) =====
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - incidents-network

  # ===== TON SERVICE 1 : EUREKA =====
  eureka-server:
    build: ./infra/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===== TON SERVICE 2 : CONFIG SERVER =====
  config-server:
    build: ./infra/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      # Cela connecte votre dossier Windows au dossier /app/config-repo dans Docker
      - ./config-repo:/app/config-repo
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      # On force Spring à regarder dans le dossier qu'on vient de monter
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: file:///app/config-repo
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - incidents-network

  # ===== TON SERVICE 3 : API GATEWAY =====
  gateway:
    build: ./infra/gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - incidents-network

  # ===== PERSONNE 2 : AUTH SERVICE =====
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_db
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - postgres
      - keycloak
      - eureka-server
      - config-server
    networks:
      - incidents-network

  # ===== PERSONNE 3 : INCIDENT SERVICE =====
  incident-service:
    build: ./incident-service
    container_name: incident-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incidents_db
    depends_on:
      - postgres
      - eureka-server
      - config-server
    networks:
      - incidents-network

  # ===== PERSONNE 3 : COMMENT SERVICE =====
  comment-service:
    build: ./incident-service
    container_name: comment-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/comments_db
    depends_on:
      - postgres
      - eureka-server
    networks:
      - incidents-network

  # ===== PERSONNE 4 : CHATBOT SERVICE =====
  chatbot-service:
    build: ./chatbot-service
    container_name: chatbot-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chat_db
    depends_on:
      - postgres
      - eureka-server
      - incident-service
    networks:
      - incidents-network

  # ===== PERSONNE 5 : FRONTEND REACT =====
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    depends_on:
      - gateway
    networks:
      - incidents-network

networks:
  incidents-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  ollama-data: