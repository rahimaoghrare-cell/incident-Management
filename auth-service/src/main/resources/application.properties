server.port=8081
spring.application.name=auth-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8888/realms/incident-mgmt

# Keycloak
keycloak.server-url=http://localhost:8888
keycloak.realm=incident-mgmt
keycloak.client-id=auth-service
keycloak.client-secret=your-secret-here