server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        # --- Personne 2 : User / Auth Service ---
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: userCB
                fallbackUri: forward:/fallback/user

        # --- Personne 3 : Incident Service ---
        - id: incident-service
          uri: lb://incident-service
          predicates:
            - Path=/api/incidents/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: incidentCB
                fallbackUri: forward:/fallback/incident

        # --- Personne 3 : Comment Service ---
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comments/**
          filters:
            - StripPrefix=0

        # --- Personne 4 : Chat Service ---
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: chatCB
                fallbackUri: forward:/fallback/chat

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      userCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
      incidentCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
      chatCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s

management:
  endpoints:
    web:
      exposure:
        include: "*"
